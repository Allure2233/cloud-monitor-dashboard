services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: cloud-monitor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: cloud_monitor_2026
      MYSQL_DATABASE: cloud_monitor
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask 应用
  web:
    build: .
    container_name: cloud-monitor-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: cloud_monitor_2026
      DB_NAME: cloud_monitor
      FLASK_SECRET_KEY: production-secret-change-me
      FLASK_DEBUG: "false"
    volumes:
      - ./scripts:/seed-scripts:ro
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
